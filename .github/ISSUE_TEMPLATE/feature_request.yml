name: Feature Request
description: Suggest a new feature or improvement for the Classic ASP extension
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Got an idea to improve the extension? We'd love to hear it!
        Please describe your suggestion in as much detail as you can.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem or limitation does this feature address? What are you trying to do that currently isn't possible or is frustrating?
      placeholder: e.g. There is no way to navigate to the definition of a VBScript function across multiple `.asp` files.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you'd like to see. Include code examples or screenshots if helpful.
      placeholder: |
        e.g. Add go-to-definition support so that pressing F12 on a function call navigates to where it is defined,
        even if it is in a separate `.asp` file.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or alternative approaches? Why do they fall short? (Optional)
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Anything else relevant — links to similar extensions, related issues, mockups, etc. (Optional)
    validations:
      required: false
