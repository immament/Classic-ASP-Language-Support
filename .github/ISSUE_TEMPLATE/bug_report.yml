name: Bug Report
description: Report a bug or unexpected behaviour in the Classic ASP extension
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as you can.
        Fields marked as optional can be left blank, but the more detail you provide, the easier it is to reproduce and fix.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise summary of what the bug is.
      placeholder: e.g. Auto-indentation incorrectly indents the closing tag when inner closing tags are missing.
    validations:
      required: true

  - type: textarea
    id: current-behaviour
    attributes:
      label: Current Behaviour
      description: What is actually happening? Include a code snippet if relevant.
      placeholder: |
        e.g. `End If` is indented to the inner `If` statement even though it is outside the `While` loop.

        ```vbscript
        If condition Then
            While
                If condition Then

        Wend
                End If
        ```
    validations:
      required: true

  - type: textarea
    id: expected-behaviour
    attributes:
      label: Expected Behaviour
      description: What should happen instead? Include a code snippet if relevant.
      placeholder: |
        ```vbscript
        If condition Then
            While
                If condition Then

            Wend
        End If
        ```
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reliably reproduce the bug. (Optional)
      placeholder: |
        1. Open a `.asp` file
        2. Type ...
        3. Press Enter / trigger formatting
        4. Observe the result
    validations:
      required: false

  - type: markdown
    attributes:
      value: "### Environment (Optional)"

  - type: input
    id: extension-version
    attributes:
      label: Extension Version
      description: Found in the Extensions panel in VS Code.
      placeholder: e.g. 1.2.0
    validations:
      required: false

  - type: input
    id: vscode-version
    attributes:
      label: VS Code Version
      description: Found under Help → About in VS Code.
      placeholder: e.g. 1.87.0
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. Windows 11, macOS 14, Ubuntu 22.04
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Anything else that might be relevant — screenshots, related issues, workarounds, etc. (Optional)
    validations:
      required: false
